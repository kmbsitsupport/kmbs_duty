version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./app.db:/app/app.db
    env_file:
      - .env
    restart: unless-stopped

  bot:
    build: ./bot
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
